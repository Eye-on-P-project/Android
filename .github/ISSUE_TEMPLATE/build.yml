name: "🏗️ Build"
description: "빌드/의존성/CI 구성 변경"
title: "[BUILD] EYE-XX 작업 개요"
labels: ["build"]
body:
  - type: input
    id: notion_title
    attributes:
      label: "작업 개요"
      description: "예: CI 캐시 최적화"
      placeholder: "작업 개요를 입력하세요"
    validations:
      required: true

  - type: input
    id: notion_link
    attributes:
      label: "Notion 링크"
      description: "해당 업무의 Notion 페이지 URL"
      placeholder: "https://www.notion.so/..."
    validations:
      required: true
