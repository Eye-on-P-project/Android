name: "🧺 Chore"
description: "기타 유지보수/환경 설정"
title: "[CHORE] EYE-XX"
labels: ["chore"]
body:
  - type: input
    id: notion_id
    attributes:
      label: "Notion Task ID"
      description: "예: EYE-15"
      placeholder: "EYE-15"
    validations:
      required: true

  - type: input
    id: notion_title
    attributes:
      label: "업무 제목"
      description: "예: 린터/포맷터 규칙 통일"
      placeholder: "업무 제목을 입력하세요"
    validations:
      required: true

  - type: input
    id: notion_link
    attributes:
      label: "Notion 링크"
      description: "해당 업무의 Notion 페이지 URL"
      placeholder: "https://www.notion.so/..."
    validations:
      required: true
