name: "🧼 Refactor"
description: "리팩토링"
title: "[REFACTOR] EYE-XX 작업 개요"
labels: ["refactor"]
body:
  - type: input
    id: notion_title
    attributes:
      label: "작업 개요"
      description: "예: 홈 화면 상태 관리 리팩토링"
      placeholder: "작업 개요를 입력하세요"
    validations:
      required: true

  - type: input
    id: notion_link
    attributes:
      label: "Notion 링크"
      description: "해당 업무의 Notion 페이지 URL"
      placeholder: "https://www.notion.so/..."
    validations:
      required: true
