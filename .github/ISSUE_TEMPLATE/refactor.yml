name: "🧼 Refactor"
description: "리팩토링"
title: "[REFACTOR] EYE-XX"
labels: ["refactor"]
body:
  - type: input
    id: notion_id
    attributes:
      label: "Notion Task ID"
      description: "예: EYE-21"
      placeholder: "EYE-21"
    validations:
      required: true

  - type: input
    id: notion_title
    attributes:
      label: "업무 제목"
      description: "예: 홈 화면 상태 관리 리팩토링"
      placeholder: "업무 제목을 입력하세요"
    validations:
      required: true

  - type: input
    id: notion_link
    attributes:
      label: "Notion 링크"
      description: "해당 업무의 Notion 페이지 URL"
      placeholder: "https://www.notion.so/..."
    validations:
      required: true
