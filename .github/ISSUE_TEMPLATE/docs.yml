name: "📚 Docs"
description: "문서 추가/수정"
title: "[DOCS] EYE-XX 작업 개요"
labels: ["documentation"]
body:
  - type: input
    id: notion_title
    attributes:
      label: "작업 개요"
      description: "예: README 배포 섹션 보강"
      placeholder: "작업 개요를 입력하세요"
    validations:
      required: true

  - type: input
    id: notion_link
    attributes:
      label: "Notion 링크"
      description: "해당 업무의 Notion 페이지 URL"
      placeholder: "https://www.notion.so/..."
    validations:
      required: true
