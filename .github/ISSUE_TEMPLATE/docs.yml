name: "📚 Docs"
description: "문서 추가/수정"
title: "[DOCS] EYE-XX"
labels: ["documentation"]
body:
  - type: input
    id: notion_id
    attributes:
      label: "Notion Task ID"
      description: "예: EYE-09"
      placeholder: "EYE-09"
    validations:
      required: true

  - type: input
    id: notion_title
    attributes:
      label: "업무 제목"
      description: "예: README 배포 섹션 보강"
      placeholder: "업무 제목을 입력하세요"
    validations:
      required: true

  - type: input
    id: notion_link
    attributes:
      label: "Notion 링크"
      description: "해당 업무의 Notion 페이지 URL"
      placeholder: "https://www.notion.so/..."
    validations:
      required: true
